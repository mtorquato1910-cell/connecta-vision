    <script type="application/ld+json">{"@context":"https://schema.org","@graph":[{"@type":"Organization","name":"Conecta · Instrumentos de Gemologia","url":"https://gemafalsa.com.br/","logo":"https://gemafalsa.com.br/favicon.png","telephone":"+5511943436177","address":{"@type":"PostalAddress","streetAddress":"Av. Prefeito Sebastião Fernandes, 240 · Centro · Shopping Premiere · Vespasiano/MG","addressCountry":"BR"}},{"@type":"WebSite","name":"Conecta · Instrumentos de Gemologia e Perícia de Gemas","url":"https://gemafalsa.com.br/","inLanguage":"pt-BR"},{"@type":"ItemList","name":"Conecta · Instrumentos de Gemologia e Perícia de Gemas","numberOfItems":17,"itemListElement":[{"@type":"ListItem","position":1,"item":{"@type":"Product","name":"Laboratório Gemológico Móvel Completo KA41KRS","category":"LABORATÓRIO GEMOLÓGICO","description":"O KA41KRS é um laboratório gemológico móvel completo da A. KRÜSS (Alemanha), uma maleta de alumínio à prova de choque com todos os instrumentos padrão para avaliar gemas com segurança fora do laboratório fixo. Permite distinguir com confiança pedras naturais, sintéticas e imitações.","brand":{"@type":"Brand","name":"A."}}},{"@type":"ListItem","position":2,"item":{"@type":"Product","name":"Microscópio Estéreo Gemológico KSW6000","category":"MICROSCOPIA GEMOLÓGICA","description":"O KSW6000 é o microscópio estéreo gemológico da A. KRÜSS para exame de gemas, pedras preciosas e minerais. Zoom contínuo, cabeça inclinável e giratória e múltiplos modos de iluminação, luz transmitida, campo escuro, LED de pescoço de ganso e lâmpada fluorescente.","brand":{"@type":"Brand","name":"A."}}},{"@type":"ListItem","position":3,"item":{"@type":"Product","name":"Microscópio de Imersão Gemológico KSW4000-K-W","category":"MICROSCOPIA GEMOLÓGICA","description":"O KSW4000-K-W é o microscópio estéreo horizontal de imersão da A. KRÜSS, usa líquido de imersão para eliminar reflexos da superfície e das facetas, entregando máxima clareza em pedras facetadas e apresentação de inclusões em alto contraste.","brand":{"@type":"Brand","name":"A."}}},{"@type":"ListItem","position":4,"item":{"@type":"Product","name":"Refratômetro de Gemas ER601-LED","category":"REFRATÔMETRO","description":"O ER601-LED é o refratômetro de gemas profissional da A. KRÜSS, com iluminação LED, mede o índice de refração da pedra para identificação, teste de autenticidade e classificação de qualidade. Óptica de alto nível para leituras precisas mesmo em uso intenso.","brand":{"@type":"Brand","name":"A."}}},{"@type":"ListItem","position":5,"item":{"@type":"Product","name":"Polariscópio de Mesa PK14-LED","category":"POLARISCÓPIO","description":"O PK14-LED é o polariscópio de mesa da A. KRÜSS, revela as propriedades ópticas da pedra (isotropia, anisotropia, pleocroísmo) para determinar rapidamente se ela é natural, sintética ou imitação. Iluminação LED integrada e operação simples, com resultado profissional.","brand":{"@type":"Brand","name":"A."}}},{"@type":"ListItem","position":6,"item":{"@type":"Product","name":"Conjunto Espectroscópio Gemológico KL14-1504","category":"ESPECTROSCÓPIO","description":"O KL14-1504 é o conjunto espectroscópio gemológico da A. KRÜSS, espectroscópio de mão HS1504 com prisma de visão direta Amici (sistema de 5 prismas) que entrega espectros nítidos e de alto contraste. Mede os comprimentos de onda absorvidos pela pedra para determinar composição, qualidade e tipo.","brand":{"@type":"Brand","name":"A."}}},{"@type":"ListItem","position":7,"item":{"@type":"Product","name":"Testador de Diamante SmartPro Screen I DSP30","category":"TESTADOR DE DIAMANTE","description":"O DSP30 (SmartPro Screen I) é o testador de diamante distribuído pela A. KRÜSS, testa diamantes naturais incolores (cores D-J) e verifica a permeabilidade UV de pedras soltas e montadas, sem tempo de aquecimento. Distingue diamantes sintéticos (CVD/HPHT) de naturais por tecnologia de absorção UV.","brand":{"@type":"Brand","name":"SmartPro"}}},{"@type":"ListItem","position":8,"item":{"@type":"Product","name":"Dicroscópio de Mão HD10","category":"DICROSCÓPIO","description":"O HD10 é o dicroscópio de mão da A. KRÜSS, observa o pleocroísmo (variação de cor conforme a direção) em gemas transparentes. Usa um cristal de calcita que divide a luz em dois raios polarizados perpendiculares, exibidos lado a lado.","brand":{"@type":"Brand","name":"A."}}},{"@type":"ListItem","position":9,"item":{"@type":"Product","name":"Lâmpada UV de Análise UV240","category":"LÂMPADA UV","description":"A UV240 é a lâmpada UV de análise da A. KRÜSS, com onda longa e curta e filtro especial, identifica gemas pelos efeitos de luminescência, distinguindo fluorescência (não persistente) de fosforescência (brilho persistente).","brand":{"@type":"Brand","name":"A."}}},{"@type":"ListItem","position":10,"item":{"@type":"Product","name":"Fonte de Luz Fria com Controle de Brilho","category":"FONTE DE LUZ FRIA","description":"Fontes de luz fria da A. KRÜSS para iluminação de microscopia e fotografia, brilho ajustável de forma contínua e sem alteração de cor, com lâmpada halógena que mantém a fidelidade cromática (importante para análise de gemas).","brand":{"@type":"Brand","name":"A."}}},{"@type":"ListItem","position":11,"item":{"@type":"Product","name":"Espectrômetro Portátil GoSpectro","category":"ESPECTRÔMETRO","description":"O GoSpectro é o espectrômetro portátil da GoyaLab (França) que transforma qualquer smartphone ou tablet em um espectrômetro ultracompacto e potente. Mede espectros em emissão, transmissão ou reflexão, ideal para caracterizar a luz e analisar materiais em campo.","brand":{"@type":"Brand","name":"GoyaLab"}}},{"@type":"ListItem","position":12,"item":{"@type":"Product","name":"Espectrômetro de Fluorescência Indigo Fluo UVA-C","category":"ESPECTRÔMETRO DE FLUORESCÊNCIA","description":"O Indigo Fluo UVA-C é o espectrômetro de fluorescência modular e portátil da GoyaLab (França), conecta por Bluetooth a smartphone ou tablet. Combina o módulo Indigo com um módulo de excitação de 4 LEDs UVA (365 nm) e 2 LEDs UVC (255 nm).","brand":{"@type":"Brand","name":"GoyaLab"}}},{"@type":"ListItem","position":13,"item":{"@type":"Product","name":"Espectrômetro Raman Portátil Indigo Raman 532","category":"ESPECTRÔMETRO RAMAN","description":"O Indigo Raman 532 é o espectrômetro Raman portátil da GoyaLab (França), com excitação a laser de 532 nm, modular e leve, cabe na mão. Controla por Bluetooth (app SpectroLab Android) ou por PC Windows.","brand":{"@type":"Brand","name":"GoyaLab"}}},{"@type":"ListItem","position":14,"item":{"@type":"Product","name":"Óculos-Lupa Triplet LB010","category":"LUPA","description":"O LB010 é o óculos-lupa da A. KRÜSS, com armação de titânio, magnificador de cabeça para exame de gemas com visão binocular, deixando as duas mãos livres para o trabalho. Leve, para uso prolongado.","brand":{"@type":"Brand","name":"A."}}},{"@type":"ListItem","position":15,"item":{"@type":"Product","name":"Lupa Hastings Triplet 10× HSL10","category":"LUPA","description":"A HSL10 é a clássica lupa Hastings triplet 10× da A. KRÜSS, três lentes acromáticas (corrigidas em cor) e aplanáticas (sem distorção) entregam contraste e nitidez excepcionais em todo o campo. Ferramenta essencial e padrão do exame gemológico.","brand":{"@type":"Brand","name":"A."}}},{"@type":"ListItem","position":16,"item":{"@type":"Product","name":"Pinça para Pedras KOF20F (com trava)","category":"ACESSÓRIO","description":"A KOF20F é a pinça para pedras da A. KRÜSS, em aço inox com mecanismo de trava e ponta fina, segura a gema com firmeza e precisão durante o exame, sem risco de soltar. Antiestática e não magnética.","brand":{"@type":"Brand","name":"A."}}},{"@type":"ListItem","position":17,"item":{"@type":"Product","name":"Pinça de Garra KOP30","category":"ACESSÓRIO","description":"A KOP30 é a pinça de garra (3 garras) da A. KRÜSS, em latão cromado, segura a gema pelas laterais como uma garra de joalheiro, ideal para posicionar a pedra na frente da luz durante o exame. Antiestática e não magnética.","brand":{"@type":"Brand","name":"A."}}}]},{"@type":"FAQPage","mainEntity":[{"@type":"Question","name":"Que instrumentos eu preciso para começar a periciar gemas?","acceptedAnswer":{"@type":"Answer","text":"O básico é refratômetro, polariscópio, dicroscópio, lâmpada UV e uma boa lupa ou microscópio. Se quiser tudo em um, o laboratório móvel KA41 já vem completo. Montamos a configuração ideal para o seu nível e orçamento."}},{"@type":"Question","name":"Dá para identificar diamante sintético (CVD/HPHT)?","acceptedAnswer":{"@type":"Answer","text":"O testador SmartPro DSP30 faz a triagem de diamantes incolores e indica a permeabilidade UV; para análise mais profunda, os espectrômetros de fluorescência e Raman ajudam a caracterizar a pedra. Orientamos o fluxo de teste na proposta."}},{"@type":"Question","name":"Qual o prazo de entrega?","acceptedAnswer":{"@type":"Answer","text":"São instrumentos importados da Europa (A. KRÜSS, na Alemanha, e GoyaLab, na França). O prazo depende do item e do lote de importação e é informado com clareza no orçamento, sem surpresa."}},{"@type":"Question","name":"Os instrumentos têm garantia?","acceptedAnswer":{"@type":"Answer","text":"Sim, contam com a garantia do fabricante. As condições específicas de cada item seguem detalhadas na proposta, junto com a documentação fiscal completa."}},{"@type":"Question","name":"Vocês entregam em todo o Brasil?","acceptedAnswer":{"@type":"Answer","text":"Sim, cobertura nacional com transportadora especializada e seguro. Orientamos a melhor configuração à distância e acompanhamos a entrega."}}]}]}</script>
